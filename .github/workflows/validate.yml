name: Skills Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Validate skills
      run: npm run validate

    - name: Check marketplace.json
      run: |
        if [ ! -f .claude-plugin/marketplace.json ]; then
          echo "Error: marketplace.json not found"
          exit 1
        fi

    - name: List available skills
      run: |
        echo "Available skills:"
        node -e "const config = require('./.claude-plugin/marketplace.json'); config.skills.forEach(s => console.log(\`- \${s.name} (v\${s.version})\`))"